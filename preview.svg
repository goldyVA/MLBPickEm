<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1B3A5C"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#E8A838" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#1B3A5C" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Baseball emoji large -->
  <text x="600" y="260" font-size="180" text-anchor="middle" dominant-baseline="middle">⚾</text>

  <!-- Title -->
  <text x="600" y="370" font-family="Georgia, serif" font-size="72" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">MLB Pick'em</text>

  <!-- Subtitle -->
  <text x="600" y="450" font-family="Georgia, serif" font-size="34" font-style="italic"
        fill="#E8A838" text-anchor="middle">Pick every game. Beat the group.</text>

  <!-- Bottom tagline -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="24"
        fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">DAILY · STANDINGS · SURVIVOR</text>
</svg>
